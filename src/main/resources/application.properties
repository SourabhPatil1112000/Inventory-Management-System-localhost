# Application
spring.application.name=Patil-Batteries-And-Power-Solutions
server.port=8092

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/patil_batteries?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Sourabh@2000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Session timeout (90 minutes)
server.servlet.session.timeout=90m

# File upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=com.shopManagmentSystem.PatilBatteriesAndPowerSolutions.controller
springdoc.paths-to-match=/**

# Optional: Group endpoints by tags
springdoc.show-actuator=false
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
